name: Distributed Testor

on:
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        worker_id: [1,2,3,4,5,6]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Select session
        run: |
          case "${{ matrix.worker_id }}" in
            1) echo "SESSION_ID=${{ secrets.SESSION_ID_1 }}" >> $GITHUB_ENV ;;
            2) echo "SESSION_ID=${{ secrets.SESSION_ID_2 }}" >> $GITHUB_ENV ;;
            3) echo "SESSION_ID=${{ secrets.SESSION_ID_3 }}" >> $GITHUB_ENV ;;
            4) echo "SESSION_ID=${{ secrets.SESSION_ID_4 }}" >> $GITHUB_ENV ;;
            5) echo "SESSION_ID=${{ secrets.SESSION_ID_5 }}" >> $GITHUB_ENV ;;
            6) echo "SESSION_ID=${{ secrets.SESSION_ID_6 }}" >> $GITHUB_ENV ;;
          esac

      - name: Run worker
        run: npm start -- --mode contribute --session-id $SESSION_ID --institute-id $INSTITUTE_ID
        env:
          INSTITUTE_ID: ${{ secrets.INSTITUTE_ID }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
